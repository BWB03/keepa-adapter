name: Release MCPB

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mcpb:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate MCPB
        run: npm run mcpb:validate

      - name: Pack MCPB
        run: npm run mcpb:pack

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.mcpb
          generate_release_notes: true
